name: 💡 Suggestion
description: Share an idea or feature request for the HUD
title: "[Suggestion]: "
labels: ["suggestion"]
body:
  - type: markdown
    attributes:
      value: Thanks for the idea! Anything is fair game — screens, flow, rules helpers, hardware.
  - type: textarea
    id: idea
    attributes:
      label: Your idea
      description: What would you like the HUD to do?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why / when would you use it?
      description: Optional — the problem it solves or the moment at the table where it helps.
  - type: dropdown
    id: where
    attributes:
      label: Where does it apply?
      options:
        - Web twin (browser)
        - Presto firmware (device)
        - Both
        - Not sure
